<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shield AI - URL Detection</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #07111f; color: #f5f7fb; }
    .container { max-width: 900px; margin: 0 auto; padding: 48px 24px; }
    .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); }
    h1 { margin-top: 0; }
    .btn { display: inline-block; margin-top: 16px; padding: 10px 16px; background: #2f80ed; color: white; border-radius: 8px; text-decoration: none; }
    code { background: #0f172a; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Shield AI</h1>
      <p>This project detects suspicious or fake URLs using a lightweight Flask backend and AI-assisted analysis.</p>
      <p>Open the API endpoint <code>/api/analyze</code> with a JSON body like <code>{"url":"https://example.com"}</code>.</p>
      <a class="btn" href="/api/analyze">Try the analyzer</a>
    </div>
  </div>
</body>
</html>
